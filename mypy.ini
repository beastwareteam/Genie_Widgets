[mypy]
# MyPy ultra-strict configuration - 2026 standards
python_version = 3.13

# Strict mode - all checks enabled
strict = True

# MyPy search paths for stubs
mypy_path = src/widgetsystem

# Disallow dynamic typing
disallow_any_unimported = True
# Keeping selected Any checks relaxed for Qt-heavy code.
disallow_any_expr = False
disallow_any_decorated = False
disallow_any_explicit = False
disallow_any_generics = True
disallow_subclassing_any = True

# Disallow untyped definitions and calls
disallow_untyped_calls = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_decorators = True

# None and Optional handling
no_implicit_optional = True
strict_optional = True

# Configuring warnings
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_return_any = True
warn_unreachable = True

# Miscellaneous strictness flags
strict_equality = True
strict_concatenate = True
extra_checks = True
local_partial_types = True

# Configuring error messages
show_error_context = True
show_column_numbers = True
show_error_codes = True
pretty = True
color_output = True
error_summary = True

# Enable additional modern error codes (PEP 688+)
enable_error_code = explicit-override,mutable-override,redundant-self,truthy-iterable,ignore-without-code,unused-awaitable,redundant-expr

# Incremental mode
incremental = True
cache_dir = .mypy_cache

# Advanced options
warn_unused_configs = True
namespace_packages = True
explicit_package_bases = True
check_untyped_defs = True
ignore_missing_imports = False
follow_imports = normal
follow_imports_for_stubs = True

# Plugins
# Keep empty unless a real plugin module path is configured.
plugins =

# Per-module options
[mypy-PySide6QtAds.*]
ignore_missing_imports = False  # We have stubs now

[mypy-PySide6.*]
ignore_missing_imports = True

[mypy-PySide6QtAds.*]
ignore_missing_imports = True

[mypy-tests.*]
# Tests can be slightly less strict
disallow_untyped_defs = False
disallow_untyped_decorators = False
disallow_untyped_calls = False
warn_return_any = False

[mypy-examples.*]
# Examples can be less strict
disallow_untyped_defs = False
disallow_untyped_decorators = False
